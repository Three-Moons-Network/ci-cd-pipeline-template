name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version/tag to deploy'
        required: true
        type: string

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.5"

jobs:
  validate:
    name: Validate Deployment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run all tests
        run: pytest tests/ -v

  build:
    name: Build Lambda Package
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build deployment package
        run: |
          mkdir -p dist/package
          pip install -r requirements.txt -t dist/package/ --quiet
          cp src/handler.py dist/package/
          cd dist/package && zip -r ../lambda.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-package
          path: dist/lambda.zip
          retention-days: 30

  plan:
    name: Plan Prod Deployment
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download lambda artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-package
          path: dist/

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -upgrade

      - name: Terraform Plan (Prod)
        working-directory: terraform
        run: |
          terraform plan \
            -var="environment=prod" \
            -var="anthropic_api_key=${{ secrets.ANTHROPIC_API_KEY }}" \
            -out=tfplan

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tf-plan-prod
          path: terraform/tfplan
          retention-days: 1

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: plan
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tf-plan-prod
          path: terraform/

      - name: Download lambda artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-package
          path: dist/

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -upgrade

      - name: Terraform Apply (Prod)
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Get endpoint URL
        id: endpoint
        working-directory: terraform
        run: echo "url=$(terraform output -raw invoke_url)" >> $GITHUB_OUTPUT

      - name: Run smoke tests
        run: |
          ./scripts/smoke-test.sh "${{ steps.endpoint.outputs.url }}"

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get Lambda function name
        id: function
        run: |
          FUNCTION=$(aws lambda list-functions \
            --region us-east-1 \
            --query 'Functions[?contains(FunctionName, `prod`)].FunctionName' \
            --output text | head -1)
          echo "name=$FUNCTION" >> $GITHUB_OUTPUT

      - name: Rollback Lambda
        if: steps.function.outputs.name != ''
        run: |
          ./scripts/rollback.sh "${{ steps.function.outputs.name }}" us-east-1

      - name: Notify rollback
        run: |
          echo "⚠ Production deployment failed and was rolled back"
          echo "Function: ${{ steps.function.outputs.name }}"
